version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Spotify Big Data Case Study
#   Services  : namenode, datanode, resourcemanager, nodemanager,
#               historyserver, jupyter (PySpark + Hadoop client)
#   Networks  : hadoop-net (bridge, all containers talk by hostname)
#   Volumes   : persistent HDFS data + Jupyter notebooks
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Hadoop HDFS NameNode ───────────────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"   # NameNode Web UI
      - "9000:9000"   # HDFS RPC
    environment:
      - CLUSTER_NAME=spotify-cluster
    env_file:
      - hadoop.env
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./data:/data:ro
      - ./mapreduce:/mapreduce:ro
      - ./scripts:/scripts
    networks:
      - hadoop-net

  # ── Hadoop HDFS DataNode ───────────────────────────────────────────────────
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    restart: unless-stopped
    ports:
      - "9864:9864"   # DataNode Web UI
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - hadoop.env
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    networks:
      - hadoop-net
    depends_on:
      - namenode

  # ── YARN ResourceManager ───────────────────────────────────────────────────
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    hostname: resourcemanager
    restart: unless-stopped
    ports:
      - "8088:8088"   # ResourceManager Web UI
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"
    env_file:
      - hadoop.env
    networks:
      - hadoop-net
    depends_on:
      - namenode
      - datanode

  # ── YARN NodeManager ───────────────────────────────────────────────────────
  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    hostname: nodemanager
    restart: unless-stopped
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    env_file:
      - hadoop.env
    networks:
      - hadoop-net
    depends_on:
      - resourcemanager

  # ── MapReduce History Server ───────────────────────────────────────────────
  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    hostname: historyserver
    restart: unless-stopped
    ports:
      - "8188:8188"   # History Server UI
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    env_file:
      - hadoop.env
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    networks:
      - hadoop-net
    depends_on:
      - resourcemanager

  # ── JupyterLab + PySpark (main analysis environment) ──────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.3.0
    container_name: jupyter
    hostname: jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"   # JupyterLab UI
      - "4040:4040"   # Spark Web UI
    user: root
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - NB_USER=jovyan
      # Point PySpark at the Hadoop cluster for HDFS access
      - HADOOP_CONF_DIR=/home/jovyan/work/hadoop-config
      - PYSPARK_SUBMIT_ARGS=--master local[*] --driver-memory 2g pyspark-shell
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      - ./spark:/home/jovyan/work/spark
      - ./hadoop-config:/home/jovyan/work/hadoop-config:ro
      - jupyter_data:/home/jovyan/work/output
    networks:
      - hadoop-net
    depends_on:
      - namenode
      - datanode

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver:
  jupyter_data:

networks:
  hadoop-net:
    name: hadoop-net
    driver: bridge
